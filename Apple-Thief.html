<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Steal My Apple!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', Arial, sans-serif;
            background-color: #e0f7fa;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #ff5252;
            color: white;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            font-size: clamp(22px, 5vw, 28px);
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #game-container {
            margin-top: 20px;
            background-color: white;
            border: 4px solid #b2ebf2;
            border-radius: 15px;
            width: 95%;
            max-width: 800px;
            height: 60vh;
            min-height: 400px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #dialogue-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #fff9c4;
            border: 2px solid #fbc02d;
            border-radius: 10px;
            padding: 15px;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: bold;
            color: #333;
            text-align: center;
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 400px;
        }

        .character {
            font-size: clamp(50px, 10vw, 80px);
            position: absolute;
            bottom: 20px;
            z-index: 5;
        }

        #farmer {
            left: 5%;
        }

        #thief {
            right: -120px;
            transition: right 1s ease-in-out;
        }

        #thief.sneak-in {
            right: 15%;
        }

        #table {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            max-width: 400px;
            min-height: 100px;
            background-color: #8d6e63;
            border-radius: 10px 10px 0 0;
            border: 3px solid #5d4037;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            padding: 10px 5px;
            box-sizing: border-box;
        }

        .apple {
            font-size: clamp(25px, 6vw, 40px);
            margin: 0 2%;
            transition: opacity 0.3s;
        }

        #controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 95%;
            align-items: center;
        }

        input[type="number"] {
            font-size: 20px;
            padding: 10px;
            width: 60px;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 8px;
        }

        button {
            font-size: clamp(16px, 4vw, 18px);
            font-weight: bold;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #ccc !important;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start { background-color: #4CAF50; }
        .btn-shout { background-color: #E91E63; }

    </style>
</head>
<body>

    <header>🍎 Don't Steal My Apple! 🥷</header>

    <div id="controls">
        <button id="btn-start" class="btn-start" onclick="startGame()">▶ Play Story</button>
        
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 20px; font-weight: bold;">Stolen Apples:</span>
            <input type="number" id="entry_answer" placeholder="?" disabled>
        </div>
        
        <button id="btn-shout" class="btn-shout" onclick="shoutAnswer()" disabled>🗣️ SHOUT!</button>
    </div>

    <div id="game-container">
        <div id="dialogue-box">Press "Play Story" to begin!</div>
        
        <div id="farmer" class="character">🧑‍🌾</div>
        
        <div id="table"></div>
        
        <div id="thief" class="character">🥷</div>
    </div>

    <script>
        const dialogueBox = document.getElementById("dialogue-box");
        const table = document.getElementById("table");
        const farmer = document.getElementById("farmer");
        const thief = document.getElementById("thief");
        const inputAnswer = document.getElementById("entry_answer");
        const btnStart = document.getElementById("btn-start");
        const btnShout = document.getElementById("btn-shout");

        let totalApples = 0;
        let stolenApples = 0;
        let leftApples = 0;
        let isAnimating = false;

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // NEW: Function to update text AND speak it out loud!
        function setDialogue(text) {
            dialogueBox.innerText = text; // Update the visual text box
            
            // Check if the browser supports Text-to-Speech
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop any currently playing voice
                let msg = new SpeechSynthesisUtterance(text);
                msg.pitch = 1.3; // Makes the voice sound a bit higher/friendlier
                msg.rate = 1.0;  // Normal speaking speed
                window.speechSynthesis.speak(msg);
            }
        }

        function drawApples(count) {
            table.innerHTML = "";
            for (let i = 0; i < count; i++) {
                let apple = document.createElement("div");
                apple.className = "apple";
                apple.innerText = "🍎";
                table.appendChild(apple);
            }
        }

        async function startGame() {
            if (isAnimating) return;
            isAnimating = true;

            btnStart.disabled = true;
            btnShout.disabled = true;
            inputAnswer.disabled = true;
            inputAnswer.value = "";

            totalApples = Math.floor(Math.random() * 6) + 5;
            stolenApples = Math.floor(Math.random() * (totalApples - 2)) + 1; 
            leftApples = totalApples - stolenApples;

            farmer.innerText = "🧑‍🌾"; 
            thief.className = "character"; 
            drawApples(totalApples);

            // Replaced innerText updates with setDialogue to trigger voice
            setDialogue(`I just put ${totalApples} apples on the table!`);
            await sleep(3500); // Slightly longer wait to let the voice finish

            setDialogue("I'm just going to rest my eyes for a second...");
            farmer.innerText = "😴"; 
            await sleep(2500);

            thief.classList.add("sneak-in"); 
            await sleep(1500);

            drawApples(leftApples); 
            await sleep(1000);

            thief.classList.remove("sneak-in"); 
            await sleep(1500);

            farmer.innerText = "😱"; 
            setDialogue("Oh no!! Some of my apples are gone! How many did the thief steal?");

            inputAnswer.disabled = false;
            btnShout.disabled = false;
            inputAnswer.focus();
            isAnimating = false;
            btnStart.innerText = "↻ Play Again";
            btnStart.disabled = false;
        }

        async function shoutAnswer() {
            if (isAnimating) return;
            
            let kidAnswer = parseInt(inputAnswer.value);

            if (isNaN(kidAnswer)) {
                alert("Please type a number first!");
                return;
            }

            isAnimating = true;
            btnShout.disabled = true;
            inputAnswer.disabled = true;

            if (kidAnswer === stolenApples) {
                farmer.innerText = "😠"; 
                setDialogue(`Hey! You stole ${stolenApples} of my apples. Give them back!!`);
                
                await sleep(2500); // Give time for the shout to be read aloud
                
                thief.innerText = "🥷💦"; 
                thief.classList.add("sneak-in");
                await sleep(1500);
                
                drawApples(totalApples); 
                farmer.innerText = "😊"; 
                setDialogue("Yay! I got all my apples back. Great job counting!");
                
                await sleep(3000);
                thief.classList.remove("sneak-in");
                thief.innerText = "🥷"; 
                
            } else {
                farmer.innerText = "🤔"; 
                setDialogue(`Hmm... I don't think it was ${kidAnswer}. Let's count what is left on the table.`);
                
                await sleep(4000);
                farmer.innerText = "😱";
                setDialogue(`I started with ${totalApples}, and now there are only ${leftApples}. Try again!`);
                
                inputAnswer.disabled = false;
                btnShout.disabled = false;
                inputAnswer.value = "";
                inputAnswer.focus();
            }
            
            isAnimating = false;
        }
    </script>
</body>
</html>
